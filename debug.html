<!DOCTYPE html>
<html>
<head>
    <meta name="robots" content="noindex, nofollow">
    <title>Debug Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #111; color: #0f0; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 10px 0; }
        pre { background: #222; padding: 15px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; }
        .error { color: red; }
        .success { color: lime; }
    </style>
</head>
<body>
    <h2>🔍 n8n Response Debugger</h2>
    <button onclick="testDirect()">Test Direct n8n URL</button>
    <button onclick="testVercel()">Test Vercel Function</button>
    <div id="output"></div>

    <script>
        async function testDirect() {
            document.getElementById('output').innerHTML = '<p>Testing direct n8n...</p>';
            try {
                const res = await fetch('https://scrapsilvercalculator.app.n8n.cloud/webhook/silver-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'hello test' })
                });
                const text = await res.text();
                document.getElementById('output').innerHTML = `
                    <p class="success">✅ Status: ${res.status}</p>
                    <p>Raw response:</p>
                    <pre>${text}</pre>
                `;
            } catch(e) {
                document.getElementById('output').innerHTML = `<p class="error">❌ Error: ${e.message}</p>`;
            }
        }

        async function testVercel() {
            document.getElementById('output').innerHTML = '<p>Testing Vercel function...</p>';
            try {
                const res = await fetch('/api/silver-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'hello test' })
                });
                const text = await res.text();
                document.getElementById('output').innerHTML = `
                    <p class="success">✅ Status: ${res.status}</p>
                    <p>Raw response:</p>
                    <pre>${text}</pre>
                `;
            } catch(e) {
                document.getElementById('output').innerHTML = `<p class="error">❌ Error: ${e.message}</p>`;
            }
        }
    </script>
</body>
</html>
