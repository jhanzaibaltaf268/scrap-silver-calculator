<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Silver Calculator | Premium Prototype</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..900&family=Outfit:wght@400..800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Design System */
            --bg: #050508;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-hover: rgba(255, 255, 255, 0.07);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --font: 'Outfit', 'Inter', system-ui, sans-serif;
            
            --mesh: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.2) 0, transparent 50%),
                    radial-gradient(at 100% 0%, rgba(192, 192, 192, 0.15) 0, transparent 50%),
                    radial-gradient(at 50% 100%, rgba(59, 130, 246, 0.1) 0, transparent 50%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: var(--mesh);
        }

        /* Ambient Background Elements */
        .glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.07) 0%, transparent 70%);
            top: -400px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Main Container */
        .calculator-card {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.6);
            margin: 20px;
            position: relative;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Result Section */
        .result-panel {
            text-align: center;
            padding-bottom: 32px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--glass-border);
        }

        .result-label {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.04em;
            color: #fff;
        }

        .result-details {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 14px;
            color: #64748b;
        }

        .detail-item span {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Input Controls */
        .control-group {
            margin-bottom: 28px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .label {
            font-size: 15px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .current-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        /* Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            outline: none;
            margin: 15px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #fff;
            border: 5px solid var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent-glow);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        /* Chip Selection */
        .chip-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .chip {
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .chip:hover {
            background: var(--glass-hover);
            border-color: rgba(255,255,255,0.2);
        }

        .chip.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        }

        .chip-top {
            display: block;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 2px;
        }

        .chip-bot {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chip.active .chip-bot {
            color: var(--accent);
        }

        /* Unit Selector */
        .unit-selector {
            display: flex;
            background: rgba(255,255,255,0.04);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
        }

        .unit-btn {
            flex: 1;
            padding: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .unit-btn.active {
            background: #fff;
            color: #000;
        }

        /* Price Status */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 32px;
            padding: 14px 20px;
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.1);
            border-radius: 16px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .status-text {
            font-size: 13px;
            color: #94a3b8;
        }

        .status-text span {
            color: #fff;
            font-weight: 600;
        }

        /* Animation */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .calculator-card {
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (max-width: 480px) {
            .calculator-card { padding: 24px; border-radius: 30px; }
            .result-value { font-size: 48px; }
            .chip-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
  <link rel="icon" type="image/png" href="favicon.png" title="Scrap Silver Calculator">
  <link rel="apple-touch-icon" href="apple-touch-icon.png" title="Scrap Silver Calculator">
</head>
<body> 
  <div id="site-header"></div>
    <div class="glow"></div>
    
    <div class="calculator-card">
        <header>
            <span class="badge">Silver Melt Tool</span>
            <h1>Instant Valuation</h1>
        </header>

        <div class="result-panel">
            <div class="result-label">Current Melt Value</div>
            <div class="result-value" id="res-val">$325.40</div>
            <div class="result-details">
                <div class="detail-item">Pure: <span id="res-pure-g">10.00</span>g</div>
                <div class="detail-item">Troy: <span id="res-pure-oz">0.321</span>oz</div>
            </div>
        </div>

        <div class="control-group">
            <div class="label-row">
                <label class="label">Total Weight</label>
                <div class="unit-selector">
                    <div class="unit-btn active" data-unit="g">G</div>
                    <div class="unit-btn" data-unit="oz">OZ</div>
                    <div class="unit-btn" data-unit="dwt">DWT</div>
                </div>
            </div>
            <input type="range" id="weight-range" min="0" max="100" step="0.5" value="10">
            <div class="label-row" style="margin-top: -10px;">
                <span style="font-size: 11px; color: #475569;">MIN</span>
                <div class="current-value"><span id="weight-display">10.0</span> <span id="unit-label">g</span></div>
                <span style="font-size: 11px; color: #475569;">MAX</span>
            </div>
        </div>

        <div class="control-group">
            <div class="label-row">
                <label class="label">Select Purity</label>
                <div class="current-value" id="purity-name">Sterling (92.5%)</div>
            </div>
            <div class="chip-grid">
                <div class="chip active" data-purity="0.925" data-name="Sterling">
                    <span class="chip-top">925</span>
                    <span class="chip-bot">Sterling</span>
                </div>
                <div class="chip" data-purity="0.999" data-name="Fine">
                    <span class="chip-top">999</span>
                    <span class="chip-bot">Fine</span>
                </div>
                <div class="chip" data-purity="0.900" data-name="Coin">
                    <span class="chip-top">900</span>
                    <span class="chip-bot">Coin</span>
                </div>
                <div class="chip" data-purity="0.835" data-name="Euro 1">
                    <span class="chip-top">835</span>
                    <span class="chip-bot">Euro</span>
                </div>
                <div class="chip" data-purity="0.800" data-name="Euro 2">
                    <span class="chip-top">800</span>
                    <span class="chip-bot">Euro</span>
                </div>
                <div class="chip" data-purity="0.400" data-name="Half">
                    <span class="chip-top">400</span>
                    <span class="chip-bot">Half</span>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="pulse-dot"></div>
            <div class="status-text">Live Spot Price: <span id="spot-price-display">$32.50</span>/oz</div>
        </div>
    </div>

    <script>
        // Constants & Config
        const CONFIG = {
            GRAMS_PER_OZ: 31.1034768,
            DWT_PER_OZ: 20,
            FALLBACK_PRICE: 32.50
        };

        // State
        let state = {
            weight: 10,
            unit: 'g',
            purity: 0.925,
            spotPrice: CONFIG.FALLBACK_PRICE
        };

        // UI Elements
        const el = {
            resVal: document.getElementById('res-val'),
            resPureG: document.getElementById('res-pure-g'),
            resPureOz: document.getElementById('res-pure-oz'),
            weightRange: document.getElementById('weight-range'),
            weightDisplay: document.getElementById('weight-display'),
            unitLabel: document.getElementById('unit-label'),
            purityName: document.getElementById('purity-name'),
            spotDisplay: document.getElementById('spot-price-display'),
            unitBtns: document.querySelectorAll('.unit-btn'),
            chips: document.querySelectorAll('.chip')
        };

        // Core Calculation
        function calculate() {
            let weightInGrams;
            if (state.unit === 'g') weightInGrams = state.weight;
            else if (state.unit === 'oz') weightInGrams = state.weight * CONFIG.GRAMS_PER_OZ;
            else if (state.unit === 'dwt') weightInGrams = state.weight * (CONFIG.GRAMS_PER_OZ / CONFIG.DWT_PER_OZ);

            const pureGrams = weightInGrams * state.purity;
            const pureOz = pureGrams / CONFIG.GRAMS_PER_OZ;
            const meltValue = pureOz * state.spotPrice;

            return {
                value: meltValue,
                pureG: pureGrams,
                pureOz: pureOz
            };
        }

        // UI Update
        function updateUI() {
            const results = calculate();
            
            // Format Currency
            el.resVal.textContent = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD'
            }).format(results.value);

            el.resPureG.textContent = results.pureG.toFixed(2);
            el.resPureOz.textContent = results.pureOz.toFixed(3);
            el.weightDisplay.textContent = parseFloat(state.weight).toFixed(state.unit === 'oz' ? 2 : 1);
            el.unitLabel.textContent = state.unit;
            el.spotDisplay.textContent = `$${state.spotPrice.toFixed(2)}`;

            // Visual feedback loop
            el.resVal.style.transform = 'scale(1.02)';
            setTimeout(() => el.resVal.style.transform = 'scale(1)', 100);
        }

        // Event Listeners
        el.weightRange.addEventListener('input', (e) => {
            state.weight = e.target.value;
            updateUI();
        });

        el.unitBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                el.unitBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.unit = btn.dataset.unit;
                
                // Adjust ranges for usability
                if (state.unit === 'g') { el.weightRange.max = 500; el.weightRange.step = 1; }
                else if (state.unit === 'oz') { el.weightRange.max = 50; el.weightRange.step = 0.1; }
                else if (state.unit === 'dwt') { el.weightRange.max = 300; el.weightRange.step = 1; }
                
                updateUI();
            });
        });

        el.chips.forEach(chip => {
            chip.addEventListener('click', () => {
                el.chips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                state.purity = parseFloat(chip.dataset.purity);
                el.purityName.textContent = `${chip.dataset.name} (${(state.purity * 100).toFixed(1)}%)`;
                updateUI();
            });
        });

        // "Live" Price Simulation
        async function fetchPrice() {
            try {
                // In a real environment, you'd fetch from an API
                // For this standalone demo, we'll keep the static but provide the hook
                const res = await fetch('https://data-asg.goldprice.org/dbXRates/USD');
                if (res.ok) {
                    const data = await res.json();
                    if (data.items && data.items[0]) {
                        state.spotPrice = data.items[0].xagPrice;
                        updateUI();
                    }
                }
            } catch (e) {
                console.log('Using fallback price');
            }
        }

        // Initial Run
        fetchPrice();
        updateUI();

    </script>
  <div id="site-footer"></div>
</body>
</html>
