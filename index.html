<body>
  <div id="site-header"></div>
  <main>
    <section class="hero hero-compact">
      <div class="container hero-content">
        <h1><span class="highlight">Scrap Silver Calculator</span></h1>

        <!-- Main Calculator Widget -->
        <div class="calc-widget slide-up" id="hero-calc">

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="calc-weight">Weight</label>
              <div class="input-group">
                <input type="number" class="form-input" id="calc-weight" placeholder="Enter weight" step="0.01" min="0" value="10">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="calc-unit">Unit</label>
              <select class="form-select" id="calc-unit">
                <option value="g" selected>Grams (g)</option>
                <option value="oz">Troy Ounces (oz)</option>
                <option value="dwt">Pennyweight (dwt)</option>
                <option value="kg">Kilograms (kg)</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="calc-purity">Silver Purity</label>
            <select class="form-select" id="calc-purity">
              <option value="0.999">999 — Fine Silver (99.9%)</option>
              <option value="0.958">958 — Britannia Silver (95.8%)</option>
              <option value="0.925" selected>925 — Sterling Silver (92.5%)</option>
              <option value="0.900">900 — Coin Silver (90.0%)</option>
              <option value="0.835">835 — European Silver (83.5%)</option>
              <option value="0.800">800 — European Silver (80.0%)</option>
            </select>
          </div>

          
          <button class="btn btn-primary btn-full" id="calc-btn" style="margin-top:var(--space-md);">Calculate Melt Value</button>
          <div class="result-display" id="hero-result">
            <div class="result-label">Estimated Melt Value</div>
            <div class="result-value" id="hero-result-value">$0.00</div>
            <div class="result-detail" id="hero-result-detail">Enter weight to calculate</div>
            <button class="share-btn" onclick="SiteComponents.copyCalculation(this)">
              <span class="icon">📋</span> Share Result
            </button>
            <div class="social-share-wrap">
              <button class="social-btn whatsapp" onclick="SiteComponents.shareResult('whatsapp')" title="WhatsApp">💬</button>
              <button class="social-btn x-twitter" onclick="SiteComponents.shareResult('x')" title="X (Twitter)">𝕏</button>
              <button class="social-btn facebook" onclick="SiteComponents.shareResult('facebook')" title="Facebook">f</button>
            </div>
          </div>
        </div>
      </div>
    </section>
    <div id="dynamic-steps"></div>
    <div id="dynamic-understand"></div>
    <div id="dynamic-faq"></div>
  </main>
    <div id="site-footer"></div>
<!-- Scripts -->
  <script src="/js/silver-price.js"></script>
  <script src="/js/calculator.js"></script>
  <script src="/js/components.js"></script>
  <script>
    // Hero Calculator Logic
    const weightInput = document.getElementById('calc-weight');
    const unitSelect = document.getElementById('calc-unit');
    const puritySelect = document.getElementById('calc-purity');
    const resultValue = document.getElementById('hero-result-value');
    const resultDetail = document.getElementById('hero-result-detail');

    function calculate() {
      const weight = parseFloat(weightInput.value) || 0;
      const unit = unitSelect.value;
      const purity = parseFloat(puritySelect.value);
      const spotPrice = SilverPrice.getPrice();

      if (weight <= 0) {
        resultValue.textContent = '$0.00';
        resultDetail.textContent = 'Enter weight to calculate';
        return;
      }

      const weightGrams = SilverCalc.toGrams(weight, unit);
      const result = SilverCalc.meltValue(weightGrams, purity, spotPrice);

      resultValue.textContent = SilverCalc.formatCurrency(result.value);
      resultDetail.textContent = `${result.silverContentGrams}g pure silver · ${result.silverContentOz} troy oz · Spot: $${spotPrice.toFixed(2)}/oz`;
    }

    weightInput.addEventListener('input', calculate);
    unitSelect.addEventListener('change', calculate);
    puritySelect.addEventListener('change', calculate);

    // Update calc when price loads
    SilverPrice.onPriceUpdate(() => calculate());

    // Initial calc
    calculate();

    // FAQ toggle
    document.querySelectorAll('.faq-question').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.closest('.faq-item').classList.toggle('open');
      });
    });

    SiteComponents.injectFAQSchema([
      { q: 'How do I calculate the value of scrap silver?', a: 'Multiply the item\'s weight in troy ounces by its purity (as a decimal) and then by the current silver spot price. For example, 10 grams of 925 sterling at $30/oz equals approximately $8.95. A silver melt value calculator does this math instantly.' },
      { q: 'What is the difference between melt value and spot price?', a: 'The spot price is the current market price for one troy ounce of pure 999 silver. The melt value is what your specific item is worth based on its weight and purity — it is always equal to or less than spot price, because most silver items contain alloys.' },
      { q: 'How do I know if my silver is real and what purity it is?', a: 'Look for a hallmark stamp on the item — common ones include 925, 900, 800, 999, or the word STERLING. If there is no marking, a jeweler or pawn shop can run an acid test or XRF analysis to confirm.' },
      { q: 'How much will a scrap dealer actually pay me?', a: 'Most scrap silver buyers pay between 70% and 95% of the calculated melt value. Local pawn shops tend to offer less; specialist online silver refiners often offer 85-95% of melt. Always get multiple offers and use a calculator to verify fairness.' },
      { q: 'Is junk silver the same as scrap silver?', a: 'Not exactly. Junk silver refers specifically to pre-1965 US coins (dimes, quarters, halves, dollars) that are 90% silver with no collectible premium. Scrap silver is a broader term covering broken jewelry, flatware, dental silver, and any silver sold for its metal.' },
      { q: 'Can I use this calculator for silver coins?', a: 'Yes — enter the coin\'s weight and select its purity (90% for pre-1965 US coins, 99.9% for Silver Eagles). For more precision, use dedicated coin calculators for silver dollars, quarters, or dimes which use official coin weights automatically.' },
      { q: 'What is the best weight unit to use — grams or troy ounces?', a: 'Use whatever your scale shows — the calculator converts for you. Grams are easiest for home scales. Avoid confusing standard ounces (28.35 g) with troy ounces (31.10 g), which is a very common and costly error.' },
      { q: 'Does silver-plated jewelry have any scrap value?', a: 'Very little. Silver-plated items have only a thin coating of silver over base metal. The actual silver content is too small to recover economically. Look for stamps like EPNS or Silver Plate to identify plated items — only solid sterling or fine silver has meaningful scrap value.' },
      { q: 'How does the gold-to-silver ratio affect my decision to sell?', a: 'The gold-to-silver ratio tells you how many ounces of silver it takes to buy one ounce of gold. When the ratio rises above 80, silver is relatively cheap and investors buy; when it falls below 60, silver is relatively expensive and may be a good time to sell.' },
      { q: 'Can I calculate silver value in currencies other than US dollars?', a: 'Yes. Silver prices are available in USD, EUR, GBP, INR, PKR, AUD, CAD, and more. For South Asian markets, Tola measurements and Tunch (purity) are also supported.' }
    ]);
  
    // Add listener to Calculate button
    const cb = document.getElementById('calc-btn');
    if (cb) {
      const fn = typeof calculate === 'function' ? calculate : (typeof calc === 'function' ? calc : null);
      if (fn) cb.addEventListener('click', fn);
    }
  </script>
