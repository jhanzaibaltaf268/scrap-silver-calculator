<!DOCTYPE html><html lang="zh"><head>
  <meta charset="UTF-8">
  <script src="/js/translations.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>银叉价值——一把银叉值多少钱？</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="description" content="按重量计算银叉的价值。纯银叉子通常重 25-70 克。">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Outfit:wght@400..800&display=swap" rel="stylesheet">

</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="container"><div id="breadcrumb"></div></div>
    <section class="page-hero"><div class="container"><h1>银叉 <span class="highlight">Value</span></h1><p>根据重量和纯度计算您的银叉值多少钱。</p></div></section>
    <div class="calc-page-layout">
      <div class="calc-widget">
        <div class="calc-widget-title"><span class="icon">🍴</span> Silver Fork Calculator</div>
        <div class="form-row">
          <div class="form-group"><label class="form-label" for="weight">重量（克）</label><input type="number" class="form-input" id="weight" value="40" step="0.1" min="0"></div>
          <div class="form-group"><label class="form-label" for="qty">数量</label><input type="number" class="form-input" id="qty" value="1" min="1" step="1"></div>
        </div>
        <div class="form-group"><label class="form-label" for="purity">纯度</label><select class="form-select" id="purity"><option value="0.999">999 好</option><option value="0.958">第958章 不列颠尼亚</option><option value="0.925" selected="">第925章</option><option value="0.900">900 银币</option><option value="0.835">835 欧洲</option><option value="0.800">800 欧洲</option></select></div>
        
          <button class="btn btn-primary btn-full" id="calc-btn" style="margin-top:var(--space-md);">计算熔毁价值</button>
          <div class="result-display">
          <div class="result-label">银叉价值</div>
          <div class="result-value" id="result-value">$0.00</div>
          <div class="result-detail" id="result-detail"></div>
        </div>
      </div>
      <div class="content-body"><h2>银叉值多少钱？</h2><p>银叉子常见于复古和古董餐具套装中。</p><h3>典型重量</h3><ul><li><strong>Salad fork</strong>：25-35克</li><li><strong>Dinner fork</strong>：35-50克</li><li><strong>Serving fork</strong>：50-70克</li></ul></div>
      <div><h3 style="margin-bottom:var(--space-lg);">相关计算器</h3><div class="related-grid">
  <a href="/zh/银器价值计算器/" class="related-link"><span class="r-icon">🍴</span> Silverware Calculator</a>
  <a href="/zh/纯银计算器/" class="related-link"><span class="r-icon">✨</span> Sterling Silver</a>
  <a href="/zh/银废料计算器/" class="related-link"><span class="r-icon">♻️</span> Scrap Calculator</a>
  <a href="/zh/如何卖白银/" class="related-link"><span class="r-icon">📖</span> How to Sell Silver</a></div></div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="/js/silver-price.js" defer></script><script src="/js/calculator.js" defer></script><script src="/js/components.js" defer></script>
  <script>
    
    SiteComponents.renderBreadcrumb('breadcrumb',[{label: window.MenuTranslations['Home'] || '首页',href:'/'},{label:'Silver Fork Value'}]);
    const w=document.getElementById('weight'),q=document.getElementById('qty'),p=document.getElementById('purity');
    function calc(){const weight=(parseFloat(w.value)||0)*(parseInt(q.value)||1);const purity=parseFloat(p.value);const spot=SilverPrice.getPrice();const r=SilverCalc.meltValue(weight,purity,spot);document.getElementById('result-value').textContent=SilverCalc.formatCurrency(r.value);document.getElementById('result-detail').textContent=r.silverContentGrams+'g pure silver · '+r.silverContentOz+' oz · Spot: $'+spot.toFixed(2)+'/oz';}
    [w,q].forEach(el=>el.addEventListener('input',calc));p.addEventListener('change',calc);SilverPrice.onPriceUpdate(()=>calc());calc();
  </script>


</body></html>
