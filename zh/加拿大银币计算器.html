<body>
  <div id="site-header"></div>
  <main>
    <div class="container"><div id="breadcrumb"></div></div>
    <section class="hero container"><div class="container">
        <div id="price-ticker"></div><h1>加拿大银币 <span class="highlight">Calculator</span></h1></div></section>
    <div class="calc-page-layout">
      <div class="calc-widget">
        <div class="calc-widget-title"><span class="icon">🪙</span> Canadian Silver Coin Calculator</div>
        
        <div class="form-group">
          <label class="form-label" for="qty">硬币数量</label>
          <input type="number" class="form-input" id="qty" value="1" min="1" step="1">
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="weight">每枚硬币的重量（克）</label>
            <input type="number" class="form-input" id="weight" value="23.33" step="0.01" readonly="" style="background:#f3f4f6; color:#6b7280; border-color:#d1d5db;">
          </div>
          <div class="form-group">
            <label class="form-label" for="purity">纯度</label>
            <input type="text" class="form-input" id="purity" value="80.0%" readonly="" style="background:#f3f4f6; color:#6b7280; border-color:#d1d5db;">
          </div>
        </div>

        
          <button class="btn btn-primary btn-full" id="calc-btn" style="margin-top:var(--space-md);">计算熔毁价值</button>
          <div class="result-display">
          <div class="result-label">总熔体值</div>
          <div class="result-value" id="result-value">$0.00</div>
          <div class="result-detail" id="result-detail"></div>
        </div>
      </div>
      <div class="content-body"><h2>加拿大银币价值</h2><p>与统一为 90% 的美国垃圾银不同，1968 年之前的加拿大银币通常是 <strong>80% silver</strong>。 （注：1967 年和 1968 年的硬币可以是 80% 或 50% 银，需要进行磁铁测试才能确定）。</p><p>该计算器默认为加拿大标准 80% 银纯度。 1968 年之前的加拿大银元含有 0.600 金衡盎司纯银。</p></div>
      <div><h3 style="margin-bottom:var(--space-lg);">相关硬币工具</h3><div class="related-grid">
        <a href="/zh/垃圾银计算器/" class="related-link"><span class="r-icon">🪙</span> Junk Silver Calc</a>
        <a href="/zh/白银面值计算器/" class="related-link"><span class="r-icon">💵</span> Face Value Calc</a>
        <a href="/zh/银币价值计算器/" class="related-link"><span class="r-icon">🏛️</span> All Silver Coins</a>
      </div></div>

  <div id="site-footer"></div>
  <script src="/js/silver-price.js" defer=""></script><script src="/js/calculator.js" defer=""></script><script src="/js/components.js" defer=""></script>
  <script>
    
    SiteComponents.renderPriceTicker('price-ticker');
    SiteComponents.renderBreadcrumb('breadcrumb',[{label: window.MenuTranslations['Home'] || '首页',href:'/'},{label:'Canadian Silver Coin Calculator'}]);
    
    const q=document.getElementById('qty');
    function calc() {
      const qty=parseInt(q.value)||0;
      const totalWeightGrams = qty * 23.33;
      const purity = 0.8;
      const spot=SilverPrice.getPrice();
      
      const r=SilverCalc.meltValue(totalWeightGrams, purity, spot);
      
      if(qty > 0) {
        document.getElementById('result-value').textContent=SilverCalc.formatCurrency(r.value);
        document.getElementById('result-detail').textContent=r.silverContentGrams+'g pure silver · '+r.silverContentOz+' oz · Spot: $'+spot.toFixed(2)+'/oz';
      } else {
        document.getElementById('result-value').textContent='$0.00';
        document.getElementById('result-detail').textContent='Enter quantity';
      }
    }
    q.addEventListener('input',calc);
    SilverPrice.onPriceUpdate(()=>calc());
    calc();
  </script>
