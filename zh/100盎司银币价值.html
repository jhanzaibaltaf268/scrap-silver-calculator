<!DOCTYPE html><html lang="zh"><head>
  <meta charset="UTF-8">
  <script src="/js/translations.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 盎司白银价值 — 100 盎司白银的当前价格</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="description" content="100 盎司银条的当前价值。 100 盎司金条的实时现货价格和数量计算器。">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=Outfit:wght@400..800&display=swap" rel="stylesheet">

</head>
<body>
  <div id="site-header"></div>
  <main>
    <div class="container"><div id="breadcrumb"></div></div>
    <section class="page-hero"><div class="container"><h1>100盎司银 <span class="highlight">Value</span></h1><p>按今日实时现货价格计算的 100 盎司白银的当前价值。</p></div></section>
    <div class="calc-page-layout">
      <div class="calc-widget">
        <div class="calc-widget-title"><span class="icon">🧱</span> 100oz Silver Value</div>
        <div class="form-group"><label class="form-label" for="qty">数量</label><input type="number" class="form-input" id="qty" value="1" min="1" step="1"></div>
        
          <button class="btn btn-primary btn-full" id="calc-btn" style="margin-top:var(--space-md);">计算熔毁价值</button>
          <div class="result-display">
          <div class="result-label">100盎司银币价值</div>
          <div class="result-value" id="result-value">$0.00</div>
          <div class="result-detail" id="result-detail"></div>
        </div>
        <h4 style="margin:var(--space-xl) 0 var(--space-md);">按数量计算的价值</h4>
        <table class="purity-table">
          <thead><tr><th>数量</th><th>总重量</th><th>价值</th></tr></thead>
          <tbody id="qty-table"></tbody>
        </table>
      </div>
      <div class="content-body"><h2>100 盎司白银值多少钱？</h2><p>100 金衡盎司（3.11 公斤）是严肃投资者的标准大尺寸银条。 100 盎司金条通常比任何零售白银产品的现货价格具有最低的溢价。</p></div>
      <div><h3 style="margin-bottom:var(--space-lg);">相关页面</h3><div class="related-grid">
        <a href="/zh/银条价值计算器/" class="related-link"><span class="r-icon">🧱</span> Bar Calculator</a>
        <a href="/zh/每盎司白银价格/" class="related-link"><span class="r-icon">📊</span> Price Per Ounce</a>
        <a href="/zh/每克白银价格/" class="related-link"><span class="r-icon">📊</span> Price Per Gram</a>
        <a href="/zh/银废料计算器/" class="related-link"><span class="r-icon">♻️</span> Scrap Calculator</a>
      </div></div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="/js/silver-price.js" defer></script><script src="/js/calculator.js" defer></script><script src="/js/components.js" defer></script>
  <script>
    
    SiteComponents.renderBreadcrumb('breadcrumb',[{label: window.MenuTranslations['Home'] || '首页',href:'/'},{label:'100oz Silver Value'}]);
    const q=document.getElementById('qty');
    function calc(){const qty=parseInt(q.value)||1;const spot=SilverPrice.getPrice();const totalOz=100*qty;const val=totalOz*spot;document.getElementById('result-value').textContent='$'+val.toFixed(2);document.getElementById('result-detail').textContent=qty+'× 100oz · '+totalOz.toFixed(2)+' oz total · Spot: $'+spot.toFixed(2)+'/oz';
      const qtys=[1,2,5,10,25,50,100];document.getElementById('qty-table').innerHTML=qtys.map(n=>'<tr><td>'+n+'</td><td>'+(100*n).toFixed(2)+' oz</td><td>$'+(100*n*spot).toFixed(2)+'</td></tr>').join('');}
    q.addEventListener('input',calc);SilverPrice.onPriceUpdate(()=>calc());calc();
  </script>


</body></html>
