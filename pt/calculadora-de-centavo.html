        <h1>Peso Penny (DWT) <span class="highlight">Silver Calculator</span></h1>
        

        <div class="calc-widget slide-up" id="dwt-calc">
          <div class="calc-widget-title"><span class="icon">⚙️</span> Pennyweight Value Calculator</div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="dwt-weight">Peso em Pennyweight (DWT)</label>
              <input type="number" class="form-input" id="dwt-weight" placeholder="Enter weight in DWT" step="0.01" min="0" value="10">
            </div>
            <div class="form-group">
              <label class="form-label" for="dwt-purity">Pureza Prateada</label>
              <select class="form-select" id="dwt-purity">
                <option value="0.999">999 – Prata Fina (99,9%)</option>
                <option value="0.958">958 - Britânia (95,8%)</option>
                <option value="0.925" selected="">925 – Libra Esterlina (92,5%)</option>
                <option value="0.900">900 – Moeda de Prata (90%)</option>
                <option value="0.835">835 - Europeu (83,5%)</option>
                <option value="0.800">800 - Europeu (80%)</option>
              </select>
            </div>
          </div>

          <!-- Conversion results -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-md);margin-bottom:var(--space-lg);">
            <div style="background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-md);text-align:center;">
              <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">Grams</div>
              <div style="font-size:var(--fs-lg);font-weight:700;color:var(--text-primary);" id="dwt-grams">15.55</div>
            </div>
            <div style="background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-md);text-align:center;">
              <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">Troy Ounces</div>
              <div style="font-size:var(--fs-lg);font-weight:700;color:var(--text-primary);" id="dwt-ozt">0.500</div>
            </div>
            <div style="background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-md);text-align:center;">
              <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">Regular Ounces</div>
              <div style="font-size:var(--fs-lg);font-weight:700;color:var(--text-primary);" id="dwt-oz">0.549</div>
            </div>
          </div>

<script src="/js/silver-price.js"></script><script src="/js/calc-button-mode.js"></script>
  <script src="/js/calculator.js"></script>
  <script src="/js/components.js"></script>
  <script>
    
    SiteComponents.renderPriceTicker('price-ticker');
    SiteComponents.renderBreadcrumb('breadcrumb', [
      { label:'Home',href:'/' },
      { label: 'Tools', href: '#' },
      { label: 'Pennyweight Calculator' }
    ]);

    const dwtWeight = document.getElementById('dwt-weight');
    const dwtPurity = document.getElementById('dwt-purity');
    const dwtGrams = document.getElementById('dwt-grams');
    const dwtOzt = document.getElementById('dwt-ozt');
    const dwtOz = document.getElementById('dwt-oz');
    const dwtResultValue = document.getElementById('dwt-result-value');
    const dwtResultDetail = document.getElementById('dwt-result-detail');

    function calcDWT() {
      const dwt = parseFloat(dwtWeight.value) || 0;
      const purity = parseFloat(dwtPurity.value);
      const spotPrice = SilverPrice.getPrice();

      const grams = dwt * 1.55517;
      const troyOz = dwt / 20;
      const regOz = grams / 28.3495;

      dwtGrams.textContent = grams.toFixed(2);
      dwtOzt.textContent = troyOz.toFixed(4);
      dwtOz.textContent = regOz.toFixed(3);

      if (dwt <= 0) {
        dwtResultValue.textContent = '$0.00';
        dwtResultDetail.textContent = 'Enter weight in DWT to calculate';
        return;
      }

      const value = troyOz * purity * spotPrice;
      const pureGrams = grams * purity;
      dwtResultValue.textContent = SilverCalc.formatCurrency(value);
      dwtResultDetail.textContent = `${pureGrams.toFixed(2)}g pure silver · ${(troyOz * purity).toFixed(4)} troy oz · Spot: $${spotPrice.toFixed(2)}/oz`;
    }

    dwtWeight.addEventListener('input', calcDWT);
    dwtPurity.addEventListener('change', calcDWT);
    SilverPrice.onPriceUpdate(() => calcDWT());
    calcDWT();

    // Conversion table
    const tableBody = document.getElementById('dwt-table');
    [1, 2, 5, 10, 15, 20, 25, 50, 100].forEach(dwt => {
      const g = (dwt * 1.55517).toFixed(2);
      const ozt = (dwt / 20).toFixed(3);
      const spotPrice = SilverPrice.getPrice();
      const val = SilverCalc.formatCurrency((dwt / 20) * 0.925 * spotPrice);
      tableBody.innerHTML += `<tr style="border-bottom:1px solid var(--border-subtle);">
        <td style="padding:var(--space-md);color:var(--text-primary);font-weight:600;">${dwt} DWT</td>
        <td style="padding:var(--space-md);text-align:right;color:var(--text-secondary);">${g}g</td>
        <td style="padding:var(--space-md);text-align:right;color:var(--text-secondary);">${ozt} oz</td>
        <td style="padding:var(--space-md);text-align:right;color:var(--accent-primary);font-weight:600;">${val}</td>
      </tr>`;
    });

    SiteComponents.injectFAQSchema([
      { q: 'What is a pennyweight (DWT)?', a: 'A pennyweight is a unit of weight equal to 1.55517 grams or 1/20 of a troy ounce. It is commonly used by jewelers to weigh precious metals.' },
      { q: 'How many pennyweight in a troy ounce?', a: 'There are exactly 20 pennyweight (DWT) in one troy ounce.' },
      { q: 'How do I convert DWT to grams?', a: 'Multiply the DWT value by 1.55517 to get grams. For example, 10 DWT = 15.55 grams.' }
    ]);
  
    // Add listener to Calculate button
    const cb = document.getElementById('calc-btn');
    if (cb) {
      const fn = typeof calculate === 'function' ? calculate :
                 (typeof calc === 'function' ? calc :
                 (typeof update === 'function' ? update : null));
      if (fn) cb.addEventListener('click', fn);
    }

  </script>
