<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Generate Store Screenshot — 1280×800</title>
<style>
  body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; padding: 24px; font-family: sans-serif; color: #eee; }
  h2 { color: #c4b5fd; margin-bottom: 8px; }
  p  { color: #8fa3bc; font-size: .85rem; margin-bottom: 16px; }
  canvas { border: 1px solid #333; }
  button { margin-top: 16px; padding: 10px 28px; border-radius: 8px; border: none; background: #7c3aed; color: #fff; font-size: 1rem; cursor: pointer; }
  button:hover { background: #6d28d9; }
</style>
</head>
<body>
<h2>Chrome Web Store Screenshot Generator — 1280×800</h2>
<p>Click Download to save the PNG. Upload it to the Screenshots field in the Chrome Web Store listing.</p>
<canvas id="c" width="1280" height="800"></canvas>
<button id="dl">⬇ Download screenshot-1280x800.png</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 800;

function rr(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function draw() {
  /* === Background === */
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0,   '#0d0b1f');
  bg.addColorStop(0.5, '#100d2e');
  bg.addColorStop(1,   '#07060f');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  /* Subtle grid lines */
  ctx.strokeStyle = 'rgba(124,58,237,0.07)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  /* Glow blobs */
  const g1 = ctx.createRadialGradient(200, 200, 0, 200, 200, 350);
  g1.addColorStop(0, 'rgba(124,58,237,0.18)');
  g1.addColorStop(1, 'transparent');
  ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);

  const g2 = ctx.createRadialGradient(1080, 600, 0, 1080, 600, 300);
  g2.addColorStop(0, 'rgba(168,85,247,0.12)');
  g2.addColorStop(1, 'transparent');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

  /* === Left text panel === */
  const lx = 90;

  /* Badge */
  ctx.fillStyle = 'rgba(124,58,237,0.25)';
  rr(ctx, lx, 120, 220, 34, 17);
  ctx.fill();
  ctx.strokeStyle = 'rgba(124,58,237,0.6)';
  ctx.lineWidth = 1.5;
  rr(ctx, lx, 120, 220, 34, 17);
  ctx.stroke();
  ctx.fillStyle = '#c4b5fd';
  ctx.font = '600 13px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('⚡  CHROME EXTENSION', lx + 14, 143);

  /* Headline */
  ctx.fillStyle = '#ffffff';
  ctx.font = '700 52px Georgia, serif';
  ctx.fillText('Scrap Silver', lx, 230);
  ctx.fillStyle = '#c4b5fd';
  ctx.fillText('Calculator', lx, 295);

  /* Subheadline */
  ctx.fillStyle = '#94a3b8';
  ctx.font = '400 20px Arial';
  const lines = [
    'Live silver spot price &',
    'instant melt value calculator',
    'right in your browser toolbar.'
  ];
  lines.forEach((l, i) => ctx.fillText(l, lx, 350 + i * 32));

  /* Feature bullets */
  const features = [
    '• Live price in USD, EUR, GBP, INR, PKR',
    '• 925 Sterling · 999 Fine · 900 Coin & more',
    '• Grams, troy oz, pennyweight, kilograms',
    '• Gold price & Gold/Silver ratio',
    '• Auto-refreshes every hour',
  ];
  ctx.fillStyle = '#c4b5fd';
  ctx.font = '400 16px Arial';
  features.forEach((f, i) => ctx.fillText(f, lx, 470 + i * 30));

  /* URL tag */
  ctx.fillStyle = 'rgba(52,211,153,0.15)';
  rr(ctx, lx, 640, 310, 36, 18);
  ctx.fill();
  ctx.fillStyle = '#34d399';
  ctx.font = '500 14px Arial';
  ctx.fillText('scrapsilvercalculater.com', lx + 14, 663);

  /* === Popup card === */
  const px = 720, py = 60, pw = 340, ph = 660;

  /* Shadow */
  ctx.shadowColor = 'rgba(124,58,237,0.5)';
  ctx.shadowBlur  = 60;
  ctx.fillStyle   = 'transparent';
  ctx.fillRect(px, py, pw, ph);
  ctx.shadowBlur  = 0;

  /* Card body */
  ctx.fillStyle = '#09090f';
  rr(ctx, px, py, pw, ph, 18);
  ctx.fill();

  /* Top accent border */
  const topGrad = ctx.createLinearGradient(px, py, px + pw, py);
  topGrad.addColorStop(0, '#7c3aed');
  topGrad.addColorStop(1, '#a855f7');
  ctx.fillStyle = topGrad;
  rr(ctx, px, py, pw, 4, 2);
  ctx.fill();

  /* Card content */
  drawPopup(px, py, pw);

  /* === Bottom tagline === */
  ctx.fillStyle = '#475569';
  ctx.font = '400 13px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Free · No account required · Works on Chrome, Edge, Brave & Opera', W / 2, H - 28);
}

function drawPopup(px, py, pw) {
  /* Header */
  ctx.fillStyle = '#13111f';
  rr(ctx, px, py, pw, 52, 18);
  ctx.fill();
  ctx.fillRect(px, py + 32, pw, 20);

  /* Ag icon */
  ctx.fillStyle = 'rgba(124,58,237,0.3)';
  rr(ctx, px + 14, py + 10, 32, 32, 8);
  ctx.fill();
  ctx.fillStyle = '#c4b5fd';
  ctx.font = '700 13px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText('Ag', px + 30, py + 31);

  /* Extension name */
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '600 13px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Scrap Silver Calc', px + 54, py + 26);

  /* LIVE badge */
  ctx.fillStyle = 'rgba(52,211,153,0.2)';
  rr(ctx, px + pw - 70, py + 12, 56, 24, 12);
  ctx.fill();
  ctx.fillStyle = '#34d399';
  ctx.font = '600 11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('● LIVE', px + pw - 42, py + 28);

  let y = py + 68;

  /* Silver spot label */
  ctx.fillStyle = '#64748b';
  ctx.font = '600 9px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('SILVER SPOT PRICE', px + 16, y);

  /* Live badge right */
  ctx.fillStyle = '#1e293b';
  rr(ctx, px + pw - 58, y - 12, 42, 18, 9);
  ctx.fill();
  ctx.fillStyle = '#94a3b8';
  ctx.font = '500 9px Arial';
  ctx.fillText('Live', px + pw - 46, y);

  y += 12;
  /* Price */
  ctx.fillStyle = '#f8fafc';
  ctx.font = '700 38px Georgia';
  ctx.fillText('$67.30', px + 14, y + 36);
  ctx.fillStyle = '#64748b';
  ctx.font = '400 13px Arial';
  ctx.fillText('/oz', px + 134, y + 30);

  /* Per gram */
  ctx.fillStyle = '#94a3b8';
  ctx.font = '400 11px Arial';
  ctx.fillText('$2.164/g', px + pw - 70, y + 14);

  y += 56;

  /* Mini grid */
  const cols = [
    { label: '925 /G', val: '$2.001', color: '#e2e8f0' },
    { label: '999 /G', val: '$2.162', color: '#e2e8f0' },
    { label: 'GOLD /OZ', val: '$2440', color: '#fbbf24' },
    { label: 'G/S RATIO', val: '36.3', color: '#e2e8f0' },
  ];
  ctx.fillStyle = '#0f0e1c';
  rr(ctx, px + 12, y, pw - 24, 42, 8);
  ctx.fill();

  cols.forEach((c, i) => {
    const cx = px + 12 + i * ((pw - 24) / 4) + 8;
    ctx.fillStyle = '#475569';
    ctx.font = '500 7.5px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(c.label, cx, y + 14);
    ctx.fillStyle = c.color;
    ctx.font = '600 10.5px Arial';
    ctx.fillText(c.val, cx, y + 30);
  });

  y += 56;

  /* Calculator label */
  ctx.fillStyle = '#fbbf24';
  ctx.font = '700 10px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('⚡  MELT VALUE CALCULATOR', px + 16, y);
  y += 18;

  /* Weight input */
  ctx.fillStyle = '#0f0e1c';
  rr(ctx, px + 12, y, 180, 34, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(124,58,237,0.4)';
  ctx.lineWidth = 1;
  rr(ctx, px + 12, y, 180, 34, 8);
  ctx.stroke();
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '500 14px Arial';
  ctx.fillText('10', px + 22, y + 22);

  /* Unit select */
  ctx.fillStyle = '#0f0e1c';
  rr(ctx, px + 200, y, 128, 34, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  rr(ctx, px + 200, y, 128, 34, 8);
  ctx.stroke();
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '500 12px Arial';
  ctx.fillText('grams', px + 212, y + 22);
  ctx.fillStyle = '#64748b';
  ctx.fillText('▾', px + 308, y + 22);

  y += 44;

  /* Purity select */
  ctx.fillStyle = '#0f0e1c';
  rr(ctx, px + 12, y, 316, 34, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  rr(ctx, px + 12, y, 316, 34, 8);
  ctx.stroke();
  ctx.fillStyle = '#e2e8f0';
  ctx.font = '500 12px Arial';
  ctx.fillText('925 Sterling (92.5%)', px + 22, y + 22);
  ctx.fillStyle = '#64748b';
  ctx.fillText('▾', px + 308, y + 22);

  y += 50;

  /* Result box */
  const rg = ctx.createLinearGradient(px + 12, y, px + pw - 12, y + 60);
  rg.addColorStop(0, '#1e0a3c');
  rg.addColorStop(1, '#120825');
  ctx.fillStyle = rg;
  rr(ctx, px + 12, y, 316, 60, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(124,58,237,0.3)';
  ctx.lineWidth = 1;
  rr(ctx, px + 12, y, 316, 60, 10);
  ctx.stroke();

  ctx.fillStyle = '#94a3b8';
  ctx.font = '600 9px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('MELT VALUE', px + pw / 2, y + 16);
  ctx.fillStyle = '#f8fafc';
  ctx.font = '700 26px Georgia';
  ctx.fillText('$20.01', px + pw / 2, y + 44);

  ctx.fillStyle = '#64748b';
  ctx.font = '400 9px Arial';
  ctx.fillText('0.2974 troy oz pure · spot $67.30/oz', px + pw / 2, y + 58);

  y += 72;

  /* Currency row */
  const curs = ['USD', 'EUR', 'GBP', 'INR', 'PKR'];
  const cbw = 52, gap = 6, startX = px + (pw - curs.length * cbw - (curs.length - 1) * gap) / 2;
  curs.forEach((c, i) => {
    const bx = startX + i * (cbw + gap);
    ctx.fillStyle = c === 'USD' ? '#7c3aed' : '#1e293b';
    rr(ctx, bx, y, cbw, 26, 13);
    ctx.fill();
    if (c === 'USD') {
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 1;
      rr(ctx, bx, y, cbw, 26, 13);
      ctx.stroke();
    }
    ctx.fillStyle = c === 'USD' ? '#fff' : '#94a3b8';
    ctx.font = '600 10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(c, bx + cbw / 2, y + 17);
  });

  y += 38;

  /* Quick links */
  const links = ['Full Calculator', 'Live Price', 'News'];
  const lbw = 96, lgap = 8, lstartX = px + (pw - links.length * lbw - (links.length - 1) * lgap) / 2;
  links.forEach((l, i) => {
    const bx = lstartX + i * (lbw + lgap);
    ctx.fillStyle = '#0f172a';
    rr(ctx, bx, y, lbw, 28, 8);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    rr(ctx, bx, y, lbw, 28, 8);
    ctx.stroke();
    ctx.fillStyle = '#94a3b8';
    ctx.font = '500 10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(l, bx + lbw / 2, y + 18);
  });

  y += 40;

  /* Footer */
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(px, y, pw, 1);
  y += 10;
  ctx.fillStyle = '#475569';
  ctx.font = '400 9px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Updated 01:51 PM', px + 16, y + 10);
  ctx.fillStyle = '#7c3aed';
  ctx.font = '700 14px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('↻', px + pw - 18, y + 12);
}

draw();

document.getElementById('dl').onclick = () => {
  const a = document.createElement('a');
  a.href     = canvas.toDataURL('image/png');
  a.download = 'screenshot-1280x800.png';
  a.click();
};
</script>
</body>
</html>
