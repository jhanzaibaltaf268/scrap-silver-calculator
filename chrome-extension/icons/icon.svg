<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#09090f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>

  <!-- Inner circle -->
  <circle cx="64" cy="64" r="42" fill="rgba(124,58,237,0.12)"/>

  <!-- "Ag" chemical symbol (silver) -->
  <text
    x="64" y="58"
    font-family="'Georgia', serif"
    font-size="34"
    font-weight="700"
    fill="url(#text-grad)"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-1"
  >Ag</text>

  <!-- Subtitle -->
  <text
    x="64" y="82"
    font-family="'Arial', sans-serif"
    font-size="10"
    font-weight="700"
    fill="#8fa3bc"
    text-anchor="middle"
    letter-spacing="1"
  >SILVER CALC</text>

  <!-- Bottom price-line decoration -->
  <polyline
    points="30,100 42,92 54,96 66,86 78,90 90,82 100,88"
    fill="none"
    stroke="#34d399"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.7"
  />
</svg>
