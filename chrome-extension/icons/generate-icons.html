<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Generate Extension Icons</title>
<style>
  body { font-family: sans-serif; background: #0f0f1a; color: #f0f4f8; padding: 24px; }
  h1   { font-size: 1.2rem; margin-bottom: 16px; color: #c4b5fd; }
  p    { font-size: .85rem; color: #8fa3bc; margin-bottom: 20px; }
  .row { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
  canvas { border: 1px solid rgba(255,255,255,.1); border-radius: 8px; display: block; }
  button { margin-top: 8px; padding: 6px 14px; border-radius: 6px; border: 1px solid #7c3aed; background: rgba(124,58,237,.2); color: #c4b5fd; cursor: pointer; font-size: .8rem; display: block; }
  button:hover { background: rgba(124,58,237,.4); }
  .size-label { font-size: .72rem; color: #8fa3bc; text-align: center; margin-bottom: 4px; }
</style>
</head>
<body>
<h1>Scrap Silver Calculator — Icon Generator</h1>
<p>Open this file in your browser, then click each "Download" button to save the PNG icons. Place them in the <code>icons/</code> folder of the extension.</p>
<div class="row" id="icons-row"></div>
<button id="dl-all" style="font-size:.9rem;padding:10px 24px;margin-top:0">⬇ Download All Icons</button>

<script>
const SIZES = [16, 32, 48, 128];

function drawIcon(ctx, size) {
  const s = size;
  const cx = s / 2, cy = s / 2;
  const r = s * 0.44;

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, s, s);
  bgGrad.addColorStop(0,   '#1a1040');
  bgGrad.addColorStop(1,   '#09090f');
  ctx.fillStyle = bgGrad;
  const rad = s * 0.18;
  roundRect(ctx, 0, 0, s, s, rad);
  ctx.fill();

  // Outer ring
  if (size >= 48) {
    const ringGrad = ctx.createLinearGradient(0, 0, s, s);
    ringGrad.addColorStop(0,   '#7c3aed');
    ringGrad.addColorStop(0.5, '#a855f7');
    ringGrad.addColorStop(1,   '#c4b5fd');
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = ringGrad;
    ctx.lineWidth   = size * 0.025;
    ctx.globalAlpha = 0.55;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Inner fill
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.84, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(124,58,237,0.13)';
  ctx.fill();

  // "Ag" text
  const tGrad = ctx.createLinearGradient(0, 0, 0, s);
  tGrad.addColorStop(0, '#ffffff');
  tGrad.addColorStop(1, '#c4b5fd');
  const fontSize = size >= 128 ? 34 : size >= 48 ? 18 : size >= 32 ? 13 : 8;
  ctx.font        = `700 ${fontSize}px Georgia, serif`;
  ctx.fillStyle   = tGrad;
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Ag', cx, cy - (size >= 48 ? size * 0.04 : 0));

  // "SILVER CALC" subtitle (only for larger sizes)
  if (size >= 48) {
    const subSize = size >= 128 ? 10 : 6;
    ctx.font      = `700 ${subSize}px Arial, sans-serif`;
    ctx.fillStyle = '#8fa3bc';
    ctx.letterSpacing = '1px';
    ctx.fillText('SILVER CALC', cx, cy + size * 0.14);
  }

  // Green sparkline (only for 48+ sizes)
  if (size >= 48) {
    const pts = [
      [0.23, 0.80], [0.33, 0.73], [0.42, 0.76], [0.52, 0.68],
      [0.61, 0.71], [0.71, 0.63], [0.79, 0.68]
    ];
    ctx.beginPath();
    ctx.moveTo(pts[0][0] * s, pts[0][1] * s);
    pts.slice(1).forEach(([x, y]) => ctx.lineTo(x * s, y * s));
    ctx.strokeStyle = '#34d399';
    ctx.lineWidth   = size >= 128 ? 2.5 : 1.5;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.globalAlpha = 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

const row = document.getElementById('icons-row');

SIZES.forEach(size => {
  const wrap  = document.createElement('div');
  const label = document.createElement('div');
  label.className  = 'size-label';
  label.textContent = `${size}×${size}`;

  const canvas = document.createElement('canvas');
  canvas.width  = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  drawIcon(ctx, size);

  const btn  = document.createElement('button');
  btn.textContent = `⬇ icon${size}.png`;
  btn.onclick = () => {
    const a    = document.createElement('a');
    a.href     = canvas.toDataURL('image/png');
    a.download = `icon${size}.png`;
    a.click();
  };

  wrap.appendChild(label);
  wrap.appendChild(canvas);
  wrap.appendChild(btn);
  row.appendChild(wrap);
});

document.getElementById('dl-all').onclick = () => {
  SIZES.forEach(size => {
    const canvas = document.querySelector(`canvas[width="${size}"]`);
    if (!canvas) return;
    const a = document.createElement('a');
    a.href     = canvas.toDataURL('image/png');
    a.download = `icon${size}.png`;
    a.click();
  });
};
</script>
</body>
</html>
