  <div id="site-header"></div>
  <main>
    <div class="container"><div id="price-ticker"></div></div>
    <section class="hero" style="padding: var(--space-2xl) 0 var(--space-xl);">
      <div class="container hero-content">
        <div id="breadcrumb"></div>
        
        <h1>Argento <span class="highlight">Tola Calculator</span></h1>
        

        <div class="calc-widget slide-up" id="tola-calc">
          <div class="calc-widget-title"><span class="icon">🌙</span> Silver Tola Value Calculator</div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="tola-weight">Peso a Tola</label>
              <input type="number" class="form-input" id="tola-weight" placeholder="Enter weight in tola" step="0.01" min="0" value="1">
            </div>
            <div class="form-group">
              <label class="form-label" for="tola-purity">Purezza dell'argento</label>
              <select class="form-select" id="tola-purity">
                <option value="0.999">999 — Argento pregiato (99,9%)</option>
                <option value="0.958">958 - Britannia (95,8%)</option>
                <option value="0.925" selected="">925 — Sterlina (92,5%)</option>
                <option value="0.900">900 — Moneta d'argento (90%)</option>
                <option value="0.835">835 - Europeo (83,5%)</option>
                <option value="0.800">800 — Europeo (80%)</option>
              </select>
            </div>
          </div>

          <!-- Conversion results -->
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-md);margin-bottom:var(--space-lg);">
            <div style="background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-md);text-align:center;">
              <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">Grams</div>
              <div style="font-size:var(--fs-lg);font-weight:700;color:var(--text-primary);" id="tola-grams">11.66</div>
            </div>
            <div style="background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-md);text-align:center;">
              <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">Troy Ounces</div>
              <div style="font-size:var(--fs-lg);font-weight:700;color:var(--text-primary);" id="tola-ozt">0.3750</div>
            </div>
            <div style="background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--space-md);text-align:center;">
              <div style="font-size:var(--fs-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;">Pennyweight</div>
              <div style="font-size:var(--fs-lg);font-weight:700;color:var(--text-primary);" id="tola-dwt">7.500</div>
            </div>
          </div>

          
          <button class="btn btn-primary btn-full" id="calc-btn" style="margin-top:var(--space-md);">Calcola Valore di Fusione</button>

            <div class="result-label">Valore Argento Per Tola</div>
            <div class="result-value" id="tola-result-value">$0.00</div>
            <div class="result-detail" id="tola-result-detail">Enter weight in tola to calculate</div>
          </div>
        </div>
      </div>
    </section>
    <div id="dynamic-steps"></div>
    <div id="dynamic-understand"></div>
    <div id="dynamic-faq"></div>
  </main>

<script src="../js/silver-price.js" defer=""></script>
  <script src="../js/calculator.js" defer=""></script>
  <script src="../js/components.js" defer=""></script>
  <script>
    
    SiteComponents.renderPriceTicker('price-ticker');
    SiteComponents.renderBreadcrumb('breadcrumb', [
      { label:'Home',href:'/' },
      { label: 'Tools', href: '#' },
      { label: 'Tola Calculator' }
    ]);

    const TOLA_TO_GRAMS = 11.6638;
    const tolaWeight = document.getElementById('tola-weight');
    const tolaPurity = document.getElementById('tola-purity');
    const tolaGrams = document.getElementById('tola-grams');
    const tolaOzt = document.getElementById('tola-ozt');
    const tolaDwt = document.getElementById('tola-dwt');
    const tolaResultValue = document.getElementById('tola-result-value');
    const tolaResultDetail = document.getElementById('tola-result-detail');

    function calcTola() {
      const tola = parseFloat(tolaWeight.value) || 0;
      const purity = parseFloat(tolaPurity.value);
      const spotPrice = SilverPrice.getPrice();

      const grams = tola * TOLA_TO_GRAMS;
      const troyOz = grams / 31.1035;
      const dwt = troyOz * 20;

      tolaGrams.textContent = grams.toFixed(2);
      tolaOzt.textContent = troyOz.toFixed(4);
      tolaDwt.textContent = dwt.toFixed(3);

      if (tola <= 0) {
        tolaResultValue.textContent = '$0.00';
        tolaResultDetail.textContent = 'Enter weight in tola to calculate';
        return;
      }

      const value = troyOz * purity * spotPrice;
      const pureGrams = grams * purity;
      tolaResultValue.textContent = SilverCalc.formatCurrency(value);
      tolaResultDetail.textContent = `${pureGrams.toFixed(2)}g pure silver · ${(troyOz * purity).toFixed(4)} troy oz · Spot: $${spotPrice.toFixed(2)}/oz`;
    }

    tolaWeight.addEventListener('input', calcTola);
    tolaPurity.addEventListener('change', calcTola);
    SilverPrice.onPriceUpdate(() => calcTola());
    calcTola();

    // Conversion table
    const tableBody = document.getElementById('tola-table');
    [0.5, 1, 2, 3, 5, 10, 15, 20, 50].forEach(tola => {
      const g = (tola * TOLA_TO_GRAMS).toFixed(2);
      const ozt = (tola * TOLA_TO_GRAMS / 31.1035).toFixed(3);
      const spotPrice = SilverPrice.getPrice();
      const val = SilverCalc.formatCurrency((tola * TOLA_TO_GRAMS / 31.1035) * 0.925 * spotPrice);
      tableBody.innerHTML += `<tr style="border-bottom:1px solid var(--border-subtle);">
        <td style="padding:var(--space-md);color:var(--text-primary);font-weight:600;">${tola} tola</td>
        <td style="padding:var(--space-md);text-align:right;color:var(--text-secondary);">${g}g</td>
        <td style="padding:var(--space-md);text-align:right;color:var(--text-secondary);">${ozt} oz</td>
        <td style="padding:var(--space-md);text-align:right;color:var(--accent-primary);font-weight:600;">${val}</td>
      </tr>`;
    });

    SiteComponents.injectFAQSchema([
      { q: 'What is a tola?', a: 'A tola is a traditional unit of weight used in South Asia and the Middle East for precious metals. 1 tola equals 11.6638 grams or 0.375 troy ounces.' },
      { q: 'How many grams in a tola?', a: '1 tola equals exactly 11.6638 grams.' },
      { q: 'What is the silver price per tola today?', a: 'The silver price per tola depends on the current spot price. Since 1 tola = 0.375 troy ounces, multiply today\'s spot price by 0.375 and the purity to get the value.' },
      { q: 'How many tola in a troy ounce?', a: 'There are approximately 2.6667 tola in one troy ounce (1 ozt = 31.1035g ÷ 11.6638g per tola).' }
    ]);
  </script>
